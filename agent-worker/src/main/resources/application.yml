spring:
  application:
    name: agent-worker
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      # Credentials: standard provider chain (instance profile in Fargate,
      # ~/.aws/credentials locally). Endpoint/credentials overridden in the
      # localstack profile for tests + local docker-compose.
      sqs:
        listener:
          # Pin concurrency to 1 — defends the SqsMigrationPlan.md §6.1
          # invariant of "≤1 in-flight envelope per (cycle, portal)" against
          # SCA's default of 10. Flip to FIFO + MessageGroupId before raising.
          max-concurrent-messages: 1
          max-messages-per-poll: 1

portal:
  id: ${PORTAL_ID:mock-payroll}

agent:
  worker:
    artifacts-dir: ${ARTIFACTS_DIR:artifacts}
    # S3 bucket for post-run artifact upload (manifest.json, report.png,
    # network.har, trace.zip, *.v1.json envelopes). When unset, uploads
    # are skipped and Audit.manifestPath falls back to the local
    # filename. Production task definitions inject ARTIFACTS_BUCKET via
    # prod-infra-setup.sh; local dev leaves it absent.
    artifacts-bucket: ${ARTIFACTS_BUCKET:}
    # Queue names follow the SqsMigrationPlan.md §3.3 pattern:
    #   <env>-financeagent-<role>[-<portal-id>]
    queue-prefix: ${SQS_QUEUE_PREFIX:dev}
    submit-queue: ${agent.worker.queue-prefix}-financeagent-tasks-submit-${portal.id}
    capture-queue: ${agent.worker.queue-prefix}-financeagent-tasks-capture-${portal.id}
    results-queue: ${agent.worker.queue-prefix}-financeagent-results

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    "[com.neoproc.financialagent]": INFO
