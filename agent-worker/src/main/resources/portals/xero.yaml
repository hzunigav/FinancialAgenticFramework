id: xero
description: Xero bank-statement CSV upload (BankRecon). One Practice login fronts all client orgs; the agent switches org by short-code and imports a statement.
baseUrl: https://go.xero.com/

# Bank-statement-only portal. Declaring the flow keeps the worker from
# registering the payroll capture/submit @SqsListeners (whose queues are not
# provisioned for a PORTAL_ID=xero worker) — only BankStatementTaskListener,
# gated on agent.worker.bankstatement-enabled, registers. Same protection as
# the submit-only INS portal (PortalFlowsEnvironmentPostProcessor).
flows:
  - bankstatement

# Shared scope: one Xero Practice login ("NeoProc") has access to every client
# org. The per-upload org selector rides on the envelope as task.xeroShortCode
# (e.g. "!0X0!!"); credentials do NOT vary per org. Secret path:
# financeagent/shared/portals/xero/{username,password,totpSeed}.
credentialScope: shared

# One session, gentle pacing. Xero login is Akamai-protected, so logins must be
# rare (we lean on session reuse, below); the per-file import itself is light.
rateLimit:
  maxConcurrent: 1
  minIntervalSeconds: 3.0

# Session reuse is the PRIMARY auth path (Phase-0 confirmed: a persisted
# storageState incl. the "Trust this device" cookie silently re-authenticates
# through Xero's OIDC form_post flow). ttlMinutes bounds how long we reuse a
# saved session before re-validating; set well under Xero's trust-device cookie
# lifetime (~30 days — CONFIRM) so we re-seed before it lapses server-side.
# Persisted via the AWS Secrets-Manager+KMS SessionStore in prod so it survives
# Fargate scale-to-zero. TODO(phase2): wire the AWS SessionStore + verify the
# reuse path waits for the OIDC redirect to settle (see XeroLoginSpike).
session:
  ttlMinutes: 20160   # 14 days

# Runtime bindings the listener (or CLI) supplies:
#   credentials.username / credentials.password / credentials.totpSeed
#       — the shared Xero login + its base32 TOTP seed (Secrets Manager).
#   task.xeroShortCode   — REQUIRED org selector; the adapter deep-links
#                          go.xero.com/app/<shortCode>/manage-bank-accounts.
#   task.bankAccountNumber (+ iban/currency) — selects the account.
#   params.source.* / file bindings — the CSV to import (set by the run path).

# --- AUTH STEPS — PROVISIONAL, NOT YET VALIDATED ---------------------------
# These run ONLY when no reusable session exists (re-seed path). Phase-0
# captured the org-switcher / bank-accounts / import DOM but the login form
# itself was completed by hand, so the selectors below are best-guess and MUST
# be validated against a real login-DOM capture before relying on headless
# re-login. Navigating to go.xero.com/ while unauthenticated auto-redirects to
# the login.xero.com OIDC form. Akamai also requires the stealth Chrome launch
# (channel=chrome + automation flags off) — a run-path change still pending.
# Auth phase — SEPARATE from the upload process (which lives in
# XeroBankStatementAdapter). Xero requires an email+password login EVERY run;
# the persisted trust-device cookie (loaded into the context from the session
# store) only skips 2FA. Selectors confirmed from the Phase-2e login-form
# capture (#xl-form-*). The run path waits for the redirect to leave
# login.xero.com before saving the refreshed session.
authSteps:
  - action: navigate
    target: /                       # go.xero.com -> redirects to the login form

  - action: fill
    selector: "[data-automationid='Username--input']"
    value: "${credentials.username}"

  - action: fill
    selector: "[data-automationid='PassWord--input']"
    value: "${credentials.password}"
    redact: true

  - action: click
    selector: "[data-automationid='LoginSubmit--button']"

  # 2FA is skipped by the trust-device cookie. When that cookie expires (~30d)
  # or is revoked, a TOTP prompt appears after Log in — handled AUTONOMOUSLY by
  # PortalRunService.completeXeroLogin: it detects the challenge, fills the code
  # from credentials.totpSeed (TotpGenerator), ticks "trust this device" to
  # re-mint the ~30d cookie, and submits. So no declarative totp step here; the
  # branch is conditional (fires only when Xero actually challenges). The 2FA
  # selectors are candidate sets (XERO_2FA_* in PortalRunService) pending a live
  # DOM capture — the first real challenge is auto-dumped (2fa-challenge.html)
  # to harden them. If the seed is ever wrong/rotated, re-seed via SessionSeeder.

# The import flow (org switch by short-code, account select, the 3-step
# Upload->Import settings->Review wizard, duplicate handling, balance read-back)
# is dynamic and lives in XeroBankStatementAdapter via Playwright, not as
# declarative steps. Known anchors from Phase-0:
#   file input : input[data-automationid="select-file-control--input"]
#   stepper    : [data-automationid="manual-upload-wizard-stepper"]
#   next        : [data-automationid="wizard-next-step-button"]
steps: []

scrape:
  fields: []

securityContext:
  scrubHarFields:
    - urlPattern: "**/login.xero.com/**"
      bodyFields:
        - password
        - totp
        - code
