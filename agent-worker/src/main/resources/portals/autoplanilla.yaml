id: autoplanilla
description: AutoPlanilla - CCSS report capture (read-only). First real portal, no MFA.
baseUrl: https://app.autoplanilla.com

# Shadow mode on by default. Nothing in the scrape flow actually submits
# anything, so this is belt-and-suspenders for the operator.
shadowMode: true

# NeoProc's single AutoPlanilla login sees every client's payroll — the
# planilla selector on the CCSS Report page picks the target client.
# Credentials live at financeagent/shared/portals/autoplanilla in Vault;
# the per-firm client selection happens via params.planillaName.
credentialScope: shared

# Shared login — one active session at a time, 5-second gap between runs.
rateLimit:
  maxConcurrent: 1
  minIntervalSeconds: 5.0

# Session reuse disabled: AutoPlanilla holds auth in sessionStorage / JWT,
# not cookies or localStorage, so Playwright's storageState() captures
# nothing useful and reuse always lands logged-out (verified empirically
# 2026-04-28 — saved storageState was 152 bytes, reused runs failed the
# post-login waitForSelector). Every run logs in fresh; the ~3s cost is
# acceptable given the descriptor's 5s rate-limit gap.
session:
  ttlMinutes: 0

# Runtime parameters the operator passes via -Dparams.<key>=<value>:
#   params.planillaId    = stable AutoPlanilla payroll id, e.g. "1051".
#                          Matched against data-value="..." on the MUI
#                          multi-select option — operators rename labels,
#                          ids never change.
#   params.planillaName  = visible label, only used in the run manifest /
#                          capture envelope for human-readable context. NOT
#                          used to drive the dropdown.
#   params.from          = ISO start date, e.g. 2026-04-01 (the Start Date
#                          input accepts ISO via .fill()). Bound from
#                          task.period.from in the capture envelope.
#   params.to            = ISO end date, e.g. 2026-04-30. Bound from
#                          task.period.to.

authSteps:
  # Selectors from the operator's Playwright codegen recording (May 2026).
  # Semantic locators (role= / label=) are preferred over CSS classes
  # because they survive Material UI class-hash churn.
  #
  # Navigate directly to /login — the home page renders an alert-link
  # "iniciar sesión" that is present in the DOM but not visible in headless
  # Chromium (Bootstrap alert animation), causing a 30s timeout. Direct
  # navigation sidesteps the link entirely.
  - action: navigate
    target: /login

  - action: fill
    selector: 'role=textbox[name="Nombre de usuario"]'
    value: "${credentials.username}"

  - action: fill
    selector: 'role=textbox[name="Su contraseña"]'
    value: "${credentials.password}"
    redact: true

  - action: click
    selector: 'role=button[name="Iniciar sesión"]'

  # Confirm authenticated state by waiting for the top-nav "Payroll" link.
  # The pre-login site is on the same domain, so a URL glob can't tell us
  # whether the credentials actually took — a post-login element can.
  - action: waitForSelector
    selector: 'role=link[name=/^Payroll$/]'

steps:
  # Navigate directly to the CCSS Report URL rather than clicking through
  # the Bootstrap nav dropdown. The Payroll nav toggle (href="#",
  # dropdown-toggle) is not stable for headless Playwright clicks, even
  # though the element resolves and is visible in headed mode.
  - action: navigate
    target: /reports/ccss

  # MUI MultiSelect interaction pattern (verified via Playwright codegen,
  # May 2026). The planilla field is a multi-select combobox — clicking
  # the trigger opens a popup with checkboxes; you must click the checkbox
  # inside the target option, then click the MuiBackdrop to close.
  #
  # The combobox is targeted by its accessible label ("Select one or more
  # payrolls") rather than #payrollIds to avoid strict-mode violations.
  # The option is targeted by data-value (stable planilla id) rather than
  # display name, which operators can rename.
  - action: waitForSelector
    selector: 'role=combobox[name="Select one or more payrolls"]'

  - action: click
    selector: 'role=combobox[name="Select one or more payrolls"]'

  - action: click
    selector: '[role="option"][data-value="${params.planillaId}"] input[type="checkbox"]'

  # Close the dropdown by clicking the MUI backdrop (clicking outside the
  # popup). The subsequent fill on Start Date is not sufficient — the
  # backdrop intercepts all outside clicks while the multi-select is open.
  - action: click
    selector: '.MuiBackdrop-root'

  - action: fill
    selector: 'role=textbox[name="Start Date"]'
    value: "${params.from}"

  - action: fill
    selector: 'role=textbox[name="End Date"]'
    value: "${params.to}"

  - action: click
    selector: 'role=button[name="Generate Report"]'

  # Wait for the pagination footer to show a non-zero total ("of N" with
  # N >= 1). Cheap substitute for a data-loaded event.
  - action: waitForSelector
    selector: 'text=/of [1-9]\d*/'

  # Bump rows-per-page to 30 so the totals row stays visible without
  # horizontal paging. Harmless when the dataset is <= 10 rows.
  - action: click
    selector: 'role=combobox[name="Rows per page"]'
  - action: click
    selector: 'role=option[name="30"]'

scrape:
  # M3 capture shape (path A): payroll-wide totals + employee count only.
  # Per-row capture is explicitly out of scope at this milestone — the
  # engine's scraper is single-value-per-selector (see PortalScraper),
  # and the QA check only needs totals to match against the government
  # portal. Revisit in M3b if per-row reconciliation becomes useful.
  #
  # Selectors below were verified via DevTools → Elements → Copy Selector
  # against a real report (April 2026). The Emotion/MUI hash classes
  # (css-1wj4860, css-4bhzvj, css-10gei56) are the only things that
  # distinguish the two footer cells from each other; expect them to
  # churn on AutoPlanilla MUI upgrades, at which point re-pick the
  # hashes from the Elements panel.
  fields:
    # Total Income (CRC) totals cell — middle of the three footer cells.
    - name: totalGrossSalaries
      selector: "tfoot tr td.MuiTableCell-footer.css-1wj4860 > div > b"

    # Renta (CRC) totals cell — rightmost of the three footer cells.
    - name: totalRenta
      selector: "tfoot tr td.MuiTableCell-footer.css-4bhzvj > div > b"

    # Pagination footer text, e.g. "1-10 of 13". Mapper pulls the
    # number after "of".
    - name: employeeCount
      selector: "div.MuiBox-root.css-10gei56 > div > div > div > span"

  # Per-employee row capture. Material React Table renders body rows as
  # <tr class="MuiTableRow-root"> inside <tbody>; tfoot is excluded by
  # the tbody anchor. Per-row column selectors are evaluated relative
  # to each row.
  #
  # Column layout (verified against a live April 2026 report):
  #   1 Identification  2 Employee  3 Total Income (USD)  4 Income Tax
  #   5 Exchange Rate   6 Total Income (CRC)              7 Renta (CRC)
  # Body cells render values as plain text (no <b> wrapper), so the
  # positional :nth-child selector is the cheap, churn-proof choice.
  # tfoot uses Emotion hashes like css-1wj4860 because the totals row
  # is bolded, but those hashes are NOT present on tbody cells.
  #
  # TODO(scaling): rows-per-page is capped at 30 by the descriptor's
  # combobox click. Larger payrolls will need pagination — out of scope
  # for this slice; revisit when a planilla > 30 employees ships.
  rows:
    selector: "tbody > tr.MuiTableRow-root"
    columns:
      id: "td:nth-child(1)"
      name: "td:nth-child(2)"
      grossSalary: "td:nth-child(6)"

securityContext:
  scrubHarFields:
    # AutoPlanilla's login endpoint — field name is a guess; update
    # once we've seen the actual POST body during a live login.
    - urlPattern: "**/login"
      bodyFields: [password, j_password, Password]
    - urlPattern: "**/auth/**"
      bodyFields: [password, Password]
