name: Deploy testing-harness to production

# Triggers when the mock-portal server code or its Dockerfile changes.
# The testing-harness is the mock government portal used for prod smoke tests
# and is reachable by agent-workers via ECS Service Connect (testing-harness:3000).
on:
  push:
    branches: [main]
    paths:
      - 'testing-harness/**'
      - 'Dockerfile.testing-harness'
      - '.github/workflows/deploy-testing-harness.yml'
  workflow_dispatch: {}

env:
  AWS_REGION:  us-east-1
  ECR_ACCOUNT: 409159414704
  CLUSTER:     financeagent

jobs:
  deploy:
    name: Build, push and deploy testing-harness
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        id: push
        run: |
          IMAGE_URI="${{ env.ECR_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/financeagent-testing-harness"
          TAG="prod-${GITHUB_SHA::8}"
          docker build -f Dockerfile.testing-harness -t "$IMAGE_URI:$TAG" -t "$IMAGE_URI:latest" .
          docker push "$IMAGE_URI:$TAG"
          docker push "$IMAGE_URI:latest"
          echo "image=$IMAGE_URI:$TAG" >> "$GITHUB_OUTPUT"
          echo "Built and pushed $IMAGE_URI:$TAG (and :latest)"

      - name: Update ECS service image
        env:
          SERVICE:   testing-harness
          NEW_IMAGE: ${{ steps.push.outputs.image }}
          CLUSTER:   ${{ env.CLUSTER }}
        run: |
          TD_ARN=$(aws ecs describe-services \
            --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].taskDefinition' --output text)

          NEW_TD_ARN=$(aws ecs describe-task-definition \
            --task-definition "$TD_ARN" \
            --query 'taskDefinition' --output json | \
          jq --arg img "$NEW_IMAGE" '
            .containerDefinitions[0].image = $img |
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                .placementConstraints, .compatibilities, .registeredAt, .registeredBy)
          ' | aws ecs register-task-definition \
            --cli-input-json file:///dev/stdin \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "$NEW_TD_ARN" \
            --force-new-deployment \
            --no-cli-pager

          echo "Deployed $NEW_IMAGE → $SERVICE (TD: $NEW_TD_ARN)"
