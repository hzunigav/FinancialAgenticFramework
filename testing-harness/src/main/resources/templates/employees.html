<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Portal - Planilla</title>
    <link rel="stylesheet" th:href="@{/css/portal.css}">
</head>
<body>
    <main class="portal-container portal-container--wide">
        <h1>Planilla — Reporte de Salarios</h1>
        <p>Revise el detalle del personal y registre los salarios mensuales.</p>
        <form th:action="@{/employees/submit}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <table id="employee-table" class="ins-table">
                <thead>
                    <tr>
                        <th>Identificación</th>
                        <th>Nombre Completo</th>
                        <th>Salario (CRC)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="employee, iter : ${employees}"
                        th:attr="data-emp-index=${iter.index},data-emp-id=${employee.id()}"
                        class="employee-row">
                        <td class="id-cell" th:text="${employee.id()}">0-000-000000</td>
                        <td class="name-cell" th:text="${employee.name()}">NOMBRE COMPLETO</td>
                        <td>
                            <input type="number" step="0.01" min="0"
                                   class="salary-input"
                                   th:name="'salary[' + ${employee.id()} + ']'"
                                   th:value="${employee.currentSalary()}">
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="2"><strong>Total actual</strong></td>
                        <td id="current-total" th:text="${currentTotal}">0.00</td>
                    </tr>
                </tfoot>
            </table>
            <button type="submit">Enviar Planilla</button>
        </form>
    </main>
</body>
</html>
