id: mock-portal
description: Local Spring Boot testing-harness mock (form login, CSRF, session cookies)
baseUrl: http://localhost:3000

shadowMode: true

session:
  ttlMinutes: 5

authSteps:
  - action: navigate
    target: /login
  - action: fill
    selector: "input[name='username']"
    value: "${credentials.username}"
  - action: fill
    selector: "input[name='password']"
    value: "${credentials.password}"
    redact: true
  - action: click
    selector: "button[type='submit']"
  - action: waitForUrl
    target: "**/report"

# Post-auth steps. Run every time (whether authSteps ran or was skipped via
# a reused session), so the scrape section always sees /report.
steps:
  - action: navigate
    target: /report

scrape:
  fields:
    - name: username
      selector: "main.portal-container > p > span"
    - name: reportDate
      selector: "#date"

securityContext:
  scrubHarFields:
    - urlPattern: "**/login"
      bodyFields: [password]
