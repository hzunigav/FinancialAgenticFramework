<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Portal - Report</title>
    <link rel="stylesheet" th:href="@{/css/portal.css}">
</head>
<body>
    <main class="portal-container">
        <h1>Generated Report</h1>
        <p>Welcome, <span th:text="${username}">user</span>.</p>
        <p>This is your confidential report.</p>
        <div id="report-data">
            <p>Report generated on: <span id="date" th:text="${today}"></span></p>
        </div>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">Logout</button>
        </form>
    </main>
</body>
</html>
